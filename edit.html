<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Edit Patient</h2>

    <div class="card p-4 shadow">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text"
                       name="fullname"
                       class="form-control"
                       value="{{ patient[1] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date"
                       name="dob"
                       class="form-control"
                       value="{{ patient[2] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       value="{{ patient[3] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Glucose</label>
                <input type="number"
                       step="0.1"
                       name="glucose"
                       class="form-control"
                       value="{{ patient[4] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Haemoglobin</label>
                <input type="number"
                       step="0.1"
                       name="haemoglobin"
                       class="form-control"
                       value="{{ patient[5] }}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cholesterol</label>
                <input type="number"
                       step="0.1"
                       name="cholesterol"
                       class="form-control"
                       value="{{ patient[6] }}"
                       required>
            </div>

            <button type="submit" class="btn btn-success">
                Update Patient
            </button>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
