<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
</head>
<body>

<h2>Add Patient</h2>

<form method="POST">

    <label>Full Name</label><br>
    <input type="text" name="fullname" required><br><br>

    <label>Date of Birth</label><br>
    <input type="date" name="dob" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" required><br><br>

    <label>Glucose</label><br>
    <input type="number" step="0.1" name="glucose" required><br><br>

    <label>Haemoglobin</label><br>
    <input type="number" step="0.1" name="haemoglobin" required><br><br>

    <label>Cholesterol</label><br>
    <input type="number" step="0.1" name="cholesterol" required><br><br>

    <button type="submit">Save Patient</button>

</form>

<br>

<a href="/">Back to Home</a>

</body>
</html>
